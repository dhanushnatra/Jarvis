<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='css/style.css') }}"
		/>
		<link
			rel="icon"
			type="image/png"
			href="{{ url_for('static', filename='imgs/jarvis.png') }}"
		/>
		<title>jarvis</title>
	</head>
	<body class="bg-black">
		<nav class="p-4 z-50 absolute top-0 left-0 w-full">
			<div class="container mx-auto flex items-center justify-between">
				<a
					href="/"
					class="text-gray-300 hover:scale-110 transition-transform duration-300 hover:text-white cursor-pointer font-bold text-lg md:text-3xl flex items-center"
					><img
						src="{{ url_for('static', filename='imgs/jarvis.png') }}"
						alt="jarvis"
						class="w-10 h-auto mx-4"
					/>Jarvis</a
				>
				<a
					target="_blank"
					href="https://github.com/dhanushnatra/jarvis"
					class="text-gray-300 hover:scale-110 transition-transform duration-300 hover:text-white bg-white/10 hover:bg-white/20 pr-3 py-4 cursor-pointer rounded-md font-medium text-sm md:text-md flex items-center"
					><img
						src="{{ url_for('static', filename='imgs/github.svg') }}"
						alt="github"
						class="w-7 h-auto mx-4"
					/>Github</a
				>
			</div>
		</nav>
		{% block content %}{% endblock %}
	</body>
</html>
